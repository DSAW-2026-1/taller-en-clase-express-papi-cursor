 <!doctype html>
 <html lang="es">
   <head>
     <meta charset="utf-8" />
     <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Taller Auth/Roles</title>
     <style>
      :root { color-scheme: light; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; line-height: 1.45; max-width: 900px; }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
      pre { background: #0b1020; color: #e5e7eb; padding: 14px; border-radius: 10px; overflow: auto; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0 18px; }
      button { border: 1px solid #d1d5db; background: #fff; padding: 10px 12px; border-radius: 10px; cursor: pointer; }
      button:hover { background: #f9fafb; }
      .card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; }
      .muted { color: #6b7280; }
     </style>
   </head>
   <body>
    <h1>Taller: Auth + Roles</h1>
    <p class="muted">Página de prueba para consumir los endpoints del taller.</p>

    <div class="card">
      <h2>Probar</h2>
      <div class="row">
        <button id="btn-health" type="button">GET /health</button>
        <button id="btn-login-admin" type="button">POST /login (ADMIN)</button>
        <button id="btn-login-user" type="button">POST /login (USER)</button>
        <button id="btn-request" type="button">GET /request (con token)</button>
      </div>
      <pre id="out">Listo.</pre>
      <p class="muted">
        Nota: En Netlify debes configurar <code>JWT_SECRET</code> en variables de entorno para que el login funcione.
      </p>
    </div>

    <script>
      const out = document.getElementById("out");
      let token = null;

      function show(obj) {
        out.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      }

      async function req(path, options = {}) {
        const res = await fetch(path, {
          headers: { "content-type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }
        if (!res.ok) throw { status: res.status, data };
        return data;
      }

      document.getElementById("btn-health").onclick = async () => {
        try { show(await req("/health")); } catch (e) { show(e); }
      };

      document.getElementById("btn-login-admin").onclick = async () => {
        try {
          const data = await req("/login", { method: "POST", body: JSON.stringify({ user: "ADMIN", password: "ADMIN" }) });
          token = data.Token || null;
          show({ ...data, savedToken: Boolean(token) });
        } catch (e) { show(e); }
      };

      document.getElementById("btn-login-user").onclick = async () => {
        try {
          const data = await req("/login", { method: "POST", body: JSON.stringify({ user: "USER", password: "USER" }) });
          token = data.Token || null;
          show({ ...data, savedToken: Boolean(token) });
        } catch (e) { show(e); }
      };

      document.getElementById("btn-request").onclick = async () => {
        try {
          if (!token) return show("Primero haz login para obtener token.");
          show(await req("/request", { headers: { authorization: `Bearer ${token}` } }));
        } catch (e) { show(e); }
      };
    </script>
   </body>
 </html>
